<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Rural Quote Finder</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body{
      font-family: Arial, sans-serif;
      background:#f4efe5;
      margin:0;
      padding:20px;
      color:#1d1b16;
    }

    .container{
      max-width:800px;
      margin:auto;
    }

    .card{
      background:white;
      padding:20px;
      border-radius:16px;
      margin-bottom:20px;
      box-shadow:0 4px 14px rgba(0,0,0,0.08);
    }

    h1,h2{
      margin-top:0;
    }

    input,button{
      width:100%;
      padding:12px;
      margin-top:10px;
      border-radius:10px;
      border:1px solid #ccc;
      box-sizing:border-box;
    }

    button{
      background:#16130f;
      color:white;
      border:none;
      cursor:pointer;
      font-weight:bold;
    }

    button:hover{
      opacity:0.9;
    }

    .product-row{
      border:1px solid #ddd;
      padding:12px;
      border-radius:10px;
      margin-top:10px;
    }

    .quote{
      background:#faf7f1;
      padding:12px;
      border-radius:10px;
      margin-top:10px;
    }
  </style>
</head>

<body>

<div class="container">

  <div class="card">
    <h1>Rural Quote Finder</h1>
    <p>Modern tools for old-school problems.</p>
  </div>

  <div class="card">
    <h2>Request Quote</h2>

    <form id="quoteForm">

      <input type="text" id="farmerName" placeholder="Your Name" required />
      <input type="email" id="farmerEmail" placeholder="Email" required />
      <input type="text" id="farmerPhone" placeholder="Phone" required />
      <input type="text" id="farmerLocation" placeholder="Location" required />

      <div id="products"></div>

      <button type="button" id="addProductBtn">
        Add Product
      </button>

      <button type="submit">
        Submit Quote Request
      </button>

    </form>
  </div>

  <div class="card">
    <h2>Store Registration</h2>

    <form id="storeForm">

      <input type="text" id="storeName" placeholder="Store Name" required />
      <input type="text" id="contactName" placeholder="Contact Name" required />
      <input type="email" id="storeEmail" placeholder="Email" required />
      <input type="text" id="storePhone" placeholder="Phone" required />
      <input type="number" id="radiusKm" placeholder="Service Radius (km)" required />
      <input type="text" id="storeLocation" placeholder="Location" required />

      <button type="submit">
        Register Store
      </button>

    </form>
  </div>

  <div class="card">
    <h2>Admin View</h2>

    <button onclick="loadQuotes()">
      Refresh Quotes
    </button>

    <div id="quotesList"></div>

  </div>

</div>

<script>

const SUPABASE_URL = "https://ozyicsnxbgkogbujlvvz.supabase.co";
const SUPABASE_KEY = "sb_publishable_U6J_w9bJpi2oCFUhcqOIzw_KO-OIrDb";

const supabaseClient = supabase.createClient(
  SUPABASE_URL,
  SUPABASE_KEY
);

const productsDiv = document.getElementById('products');

function addProductRow() {

  const row = document.createElement('div');

  row.className = 'product-row';

  row.innerHTML = `
    <input type="text" class="product-name" placeholder="Product Name" required />
    <input type="text" class="product-qty" placeholder="Quantity" required />
  `;

  productsDiv.appendChild(row);
}

document.getElementById('addProductBtn')
  .addEventListener('click', addProductRow);

addProductRow();

document.getElementById('quoteForm')
  .addEventListener('submit', async (e) => {

    e.preventDefault();

    const farmerName = document.getElementById('farmerName').value;
    const farmerEmail = document.getElementById('farmerEmail').value;
    const farmerPhone = document.getElementById('farmerPhone').value;
    const farmerLocation = document.getElementById('farmerLocation').value;

    const { data: quoteData, error: quoteError } = await supabaseClient
      .from('quotes')
      .insert([
        {
          farmer_name: farmerName,
          farmer_email: farmerEmail,
          farmer_phone: farmerPhone,
          farmer_location: farmerLocation
        }
      ])
      .select();

    if (quoteError) {
      alert('Error saving quote');
      console.error(quoteError);
      return;
    }

    const quoteId = quoteData[0].id;

    const productNames = document.querySelectorAll('.product-name');
    const productQtys = document.querySelectorAll('.product-qty');

    const items = [];

    productNames.forEach((product, index) => {

      items.push({
        quote_id: quoteId,
        product_name: product.value,
        quantity: productQtys[index].value
      });

    });

    const { error: itemError } = await supabaseClient
      .from('quote_items')
      .insert(items);

    if (itemError) {
      alert('Error saving quote items');
      console.error(itemError);
      return;
    }

    alert('Quote submitted successfully!');

    document.getElementById('quoteForm').reset();

    productsDiv.innerHTML = '';

    addProductRow();

    loadQuotes();

});

document.getElementById('storeForm')
  .addEventListener('submit', async (e) => {

    e.preventDefault();

    const { error } = await supabaseClient
      .from('stores')
      .insert([
        {
          store_name: document.getElementById('storeName').value,
          contact_name: document.getElementById('contactName').value,
          email: document.getElementById('storeEmail').value,
          phone: document.getElementById('storePhone').value,
          radius_km: document.getElementById('radiusKm').value,
          location: document.getElementById('storeLocation').value
        }
      ]);

    if (error) {
      alert('Error registering store');
      console.error(error);
      return;
    }

    alert('Store registered successfully!');

    document.getElementById('storeForm').reset();

});

async function loadQuotes() {

  const quotesList = document.getElementById('quotesList');

  quotesList.innerHTML = 'Loading...';

  const { data, error } = await supabaseClient
    .from('quotes')
    .select(`
      *,
      quote_items (*)
    `)
    .order('created_at', { ascending: false });

  if (error) {
    quotesList.innerHTML = 'Error loading quotes';
    console.error(error);
    return;
  }

  quotesList.innerHTML = '';

  data.forEach((quote) => {

    const div = document.createElement('div');

    div.className = 'quote';

    div.innerHTML = `
      <strong>${quote.farmer_name}</strong><br/>
      ${quote.farmer_location}<br/><br/>

      ${quote.quote_items.map(item =>
        `${item.product_name} - ${item.quantity}`
      ).join('<br/>')}
    `;

    quotesList.appendChild(div);

  });

}

loadQuotes();

</script>

</body>
</html>
